# Phase-3, Step-2
# What this part does:
# 1. Runs your job alert agent automatically
# 2. Installs dependencies
# 3. Executes your Python script
# 4. Schedules it to run every 4 hours

name: Job Alert Agent

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job alert agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python job_alert_agent.py
