name: Job Alert Agent

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run job agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python job_alert_agent.py

      # 🔥 THIS IS THE IMPORTANT PART (CSV SAVE)
      - name: Commit CSV files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add sent_jobs.csv job_database.csv

          git commit -m "Update job tracking CSV files" || echo "No changes"

          git push
